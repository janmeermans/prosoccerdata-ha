<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Galaxy Defenders">
<title>Galaxy Defenders</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Constants ─────────────────────────────────────────────────────────────────

const TOWER_TYPES = {
  laser:  { name:'Laser',  cost:75,  range:120, dmg:8,  fireRate:0.35, color:'#00eeff', splashR:0  },
  plasma: { name:'Plasma', cost:120, range:95,  dmg:22, fireRate:1.2,  color:'#ff8800', splashR:60 },
  sniper: { name:'Sniper', cost:100, range:190, dmg:50, fireRate:1.9,  color:'#ffff00', splashR:0  },
};
const TOWER_ORDER = ['laser','plasma','sniper'];

const ENEMY_TYPES = {
  zoid:      { maxHp:40,  speed:88,  reward:10, r:9,  color:'#22ff44' },
  cruster:   { maxHp:150, speed:44,  reward:25, r:14, color:'#bb44ff' },
  mothership:{ maxHp:500, speed:20,  reward:80, r:22, color:'#ff3333' },
};

const WAVES = [
  { enemies:[['zoid',8]],                              interval:1.2 },
  { enemies:[['zoid',10],['cruster',2]],               interval:1.0 },
  { enemies:[['cruster',5],['zoid',6]],                interval:0.9 },
  { enemies:[['zoid',15],['cruster',4]],               interval:0.8 },
  { enemies:[['cruster',6],['zoid',8],['mothership',1]],interval:0.8 },
  { enemies:[['zoid',20],['cruster',8],['mothership',2]],interval:0.7 },
];

// ── Canvas & layout ───────────────────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, tileSize, uiH, cols, rows;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  tileSize = Math.max(28, Math.floor(Math.min(W,H) / 14));
  uiH      = tileSize * 2 + 4;
  cols     = Math.floor(W / tileSize);
  rows     = Math.floor((H - uiH) / tileSize);
}

// ── Stars ─────────────────────────────────────────────────────────────────────

let stars = [];
function buildStars() {
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (H - uiH),
      r: Math.random() * 1.6 + 0.3,
      phase: Math.random() * Math.PI * 2,
      spd:   Math.random() * 2 + 0.5,
    });
  }
}

// ── Path ──────────────────────────────────────────────────────────────────────

let waypoints = [];
let pathSet   = new Set();

function buildPath() {
  pathSet   = new Set();
  waypoints = [];
  if (cols < 4 || rows < 4) return;

  const r1 = 1;
  const r2 = Math.max(r1 + 2, Math.floor(rows * 0.33));
  const r3 = Math.max(r2 + 2, Math.floor(rows * 0.66));
  const r4 = rows - 2;

  const tilePts = [];
  const addH = (fromC, toC, row) => {
    const step = fromC <= toC ? 1 : -1;
    for (let c = fromC; c !== toC + step; c += step) tilePts.push([c, row]);
  };
  const addV = (fromR, toR, col) => {
    const step = fromR <= toR ? 1 : -1;
    for (let r = fromR; r !== toR + step; r += step) tilePts.push([col, r]);
  };

  addH(0, cols - 2, r1);
  addV(r1, r2, cols - 2);
  addH(cols - 2, 1, r2);
  addV(r2, r3, 1);
  addH(1, cols - 2, r3);
  addV(r3, r4, cols - 2);
  addH(cols - 2, 0, r4);

  const seen = new Set();
  for (const pt of tilePts) {
    const key = pt[0] + ',' + pt[1];
    if (!seen.has(key)) { seen.add(key); pathSet.add(key); waypoints.push({ x: pt[0]*tileSize+tileSize/2, y: pt[1]*tileSize+tileSize/2 }); }
  }
}

// ── Game state ────────────────────────────────────────────────────────────────

let state = 'menu';
let lives, coins, wave, score;
let enemies, towers, projectiles, hitEffects;
let occupiedSet;
let selectedTower, selectedTowerNode;
let spawnQueue, spawnTimer, spawnInterval;
let waveActive, waveCooldown, gameWon;
let nextId = 0;
let wormAngle = 0;

function initGame() {
  lives = 5; coins = 150; wave = 0; score = 0;
  enemies = []; towers = []; projectiles = []; hitEffects = [];
  occupiedSet = new Set(pathSet);
  selectedTower = 'laser'; selectedTowerNode = null;
  spawnQueue = []; spawnTimer = 0; spawnInterval = 1.2;
  waveActive = false; waveCooldown = 0; gameWon = false;
  startNextWave();
}

function startNextWave() {
  wave++;
  if (wave > WAVES.length) { endGame(true); return; }
  const spec = WAVES[wave - 1];
  spawnQueue = [];
  for (const [type, count] of spec.enemies)
    for (let i = 0; i < count; i++) spawnQueue.push(type);
  for (let i = spawnQueue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [spawnQueue[i], spawnQueue[j]] = [spawnQueue[j], spawnQueue[i]];
  }
  spawnInterval = spec.interval;
  spawnTimer = 0;
  waveActive = true;
}

function endGame(won) {
  if (state !== 'game') return;
  gameWon = won;
  setTimeout(() => { state = 'gameover'; }, 1200);
}

// ── Update ────────────────────────────────────────────────────────────────────

function update(dt) {
  wormAngle += dt * 1.6;

  if (waveActive && spawnQueue.length > 0) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      const type = spawnQueue.shift();
      const def  = ENEMY_TYPES[type];
      enemies.push({ id: nextId++, type, hp: def.maxHp, maxHp: def.maxHp,
        x: waypoints[0].x, y: waypoints[0].y, waypointIdx: 1,
        speed: def.speed, reward: def.reward, r: def.r, color: def.color });
      spawnTimer = spawnInterval;
    }
  }

  const reached = [];
  for (const e of enemies) {
    if (e.waypointIdx >= waypoints.length) { reached.push(e.id); continue; }
    const wp   = waypoints[e.waypointIdx];
    const dx   = wp.x - e.x, dy = wp.y - e.y;
    const dist = Math.hypot(dx, dy);
    const step = e.speed * dt;
    if (dist <= step) { e.x = wp.x; e.y = wp.y; e.waypointIdx++; }
    else { e.x += (dx/dist)*step; e.y += (dy/dist)*step; }
  }
  for (const id of reached) {
    enemies = enemies.filter(e => e.id !== id);
    lives = Math.max(0, lives - 1);
    flashRed();
    if (lives <= 0 && state === 'game') { endGame(false); return; }
  }

  for (const t of towers) {
    t.cooldown = (t.cooldown || 0) - dt;
    if (t.cooldown > 0) continue;
    let nearest = null, nearestD = Infinity;
    for (const e of enemies) {
      const d = Math.hypot(e.x - t.x, e.y - t.y);
      if (d < t.range && d < nearestD) { nearestD = d; nearest = e; }
    }
    if (!nearest) continue;
    t.cooldown = t.fireRate;
    t.aimAngle = Math.atan2(nearest.y - t.y, nearest.x - t.x);
    const spd = 360;
    const dx  = nearest.x - t.x, dy = nearest.y - t.y, d = Math.hypot(dx,dy);
    projectiles.push({ x:t.x, y:t.y, vx:(dx/d)*spd, vy:(dy/d)*spd,
      targetId:nearest.id, dmg:t.dmg, color:t.color, splash:t.splashR>0, splashR:t.splashR });
  }

  const deadProj = [];
  for (const p of projectiles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.x < -20 || p.x > W+20 || p.y < -20 || p.y > H+20) { deadProj.push(p); continue; }
    const target = enemies.find(e => e.id === p.targetId);
    if (!target) { deadProj.push(p); continue; }
    if (Math.hypot(p.x - target.x, p.y - target.y) < target.r + 5) {
      deadProj.push(p);
      hitEffects.push({ x:p.x, y:p.y, r:4, age:0, color:p.color });
      if (p.splash) {
        for (const e of enemies)
          if (Math.hypot(p.x-e.x, p.y-e.y) < p.splashR) dealDmg(e, p.dmg);
      } else {
        dealDmg(target, p.dmg);
      }
    }
  }
  projectiles = projectiles.filter(p => !deadProj.includes(p));
  enemies     = enemies.filter(e => e.hp > 0);

  hitEffects = hitEffects.filter(h => { h.age += dt; h.r += 60*dt; return h.age < 0.25; });

  if (waveActive && spawnQueue.length === 0 && enemies.length === 0) {
    waveActive = false;
    if (wave >= WAVES.length) { endGame(true); return; }
    waveCooldown = 5;
  }
  if (waveCooldown > 0) {
    waveCooldown -= dt;
    if (waveCooldown <= 0) startNextWave();
  }
}

function dealDmg(enemy, dmg) {
  enemy.hp -= dmg;
  if (enemy.hp <= 0) { coins += enemy.reward; score += enemy.reward; }
}

let flashTimer = 0;
function flashRed() { flashTimer = 0.35; }

// ── Render ────────────────────────────────────────────────────────────────────

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function renderStars(t) {
  for (const s of stars) {
    const a = 0.35 + 0.65*(0.5+0.5*Math.sin(t*s.spd+s.phase));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function renderGame(t) {
  ctx.fillStyle = '#030312'; ctx.fillRect(0,0,W,H-uiH);
  renderStars(t);

  for (const key of pathSet) {
    const [c,r] = key.split(',').map(Number);
    const px = c*tileSize, py = r*tileSize;
    ctx.fillStyle = '#1e1608';
    ctx.strokeStyle = '#4d3a1a';
    ctx.lineWidth = 1;
    roundRect(px+2, py+2, tileSize-4, tileSize-4, 3);
    ctx.fill(); ctx.stroke();
  }

  if (waypoints.length > 0) {
    const wp = waypoints[0];
    ctx.save(); ctx.translate(wp.x, wp.y); ctx.rotate(wormAngle);
    ctx.shadowColor='#9933ff'; ctx.shadowBlur=14;
    ctx.strokeStyle='#9933ff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,tileSize*0.42,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='#cc77ff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(0,0,tileSize*0.25,0.4,Math.PI*2+0.4); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();
  }

  if (waypoints.length > 0) {
    const wp = waypoints[waypoints.length-1];
    ctx.save(); ctx.translate(wp.x, wp.y);
    ctx.shadowColor='#4499ff'; ctx.shadowBlur=10;
    ctx.fillStyle='#1a5fcc'; ctx.strokeStyle='#44bb66'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,tileSize*0.44,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.font=`${tileSize*0.48}px serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🌍',0,1);
    ctx.restore();
  }

  for (const t of towers) {
    const sel = selectedTowerNode === t;
    if (sel) {
      ctx.beginPath(); ctx.arc(t.x,t.y,t.range,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1; ctx.stroke();
    }
    const h = tileSize*0.38;
    ctx.save(); ctx.translate(t.x,t.y);
    ctx.fillStyle='#1c1c2a'; ctx.strokeStyle=t.color; ctx.lineWidth=sel?2.5:1.5;
    if (sel) { ctx.shadowColor=t.color; ctx.shadowBlur=10; }
    roundRect(-h,-h,h*2,h*2,4); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    const aim = t.aimAngle||(-Math.PI/2);
    ctx.rotate(aim - Math.PI/2);
    ctx.fillStyle=t.color;
    ctx.fillRect(-h*0.14,-h*0.88,h*0.28,h*0.9);
    ctx.rotate(-(aim - Math.PI/2));
    ctx.fillStyle=t.color; ctx.font=`bold ${tileSize*0.3}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t.type==='laser'?'L':t.type==='plasma'?'P':'S',0,0);
    ctx.restore();
  }

  for (const e of enemies) {
    ctx.save(); ctx.translate(e.x, e.y);
    if (e.type==='mothership') {
      const pulse = 1+0.08*Math.sin(t*4+e.id);
      ctx.beginPath(); ctx.arc(0,0,e.r*pulse+5,0,Math.PI*2);
      ctx.strokeStyle='rgba(255,60,60,0.55)'; ctx.lineWidth=2;
      ctx.shadowColor='#ff3333'; ctx.shadowBlur=8; ctx.stroke(); ctx.shadowBlur=0;
    }
    ctx.beginPath(); ctx.arc(0,0,e.r,0,Math.PI*2);
    ctx.fillStyle=e.color; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.5; ctx.stroke();
    const bw = e.r*2.4, bh=3.5, bx=-bw/2, by=-e.r-8;
    ctx.fillStyle='#333'; ctx.fillRect(bx,by,bw,bh);
    const frac=Math.max(0,e.hp/e.maxHp);
    ctx.fillStyle=frac>0.5?'#22dd44':frac>0.25?'#ffcc00':'#ff3333';
    ctx.fillRect(bx,by,bw*frac,bh);
    ctx.restore();
  }

  ctx.shadowBlur=8;
  for (const p of projectiles) {
    ctx.shadowColor=p.color; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.splash?5:3,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0;

  for (const h of hitEffects) {
    const a=1-h.age/0.25;
    ctx.globalAlpha=a*0.6; ctx.fillStyle=h.color;
    ctx.beginPath(); ctx.arc(h.x,h.y,h.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  if (flashTimer > 0) {
    ctx.fillStyle=`rgba(255,0,0,${(flashTimer/0.35)*0.28})`;
    ctx.fillRect(0,0,W,H-uiH);
  }

  renderUI();
}

function renderUI() {
  ctx.fillStyle='rgba(4,4,22,0.96)'; ctx.fillRect(0,H-uiH,W,uiH);
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H-uiH); ctx.lineTo(W,H-uiH); ctx.stroke();

  const midY = H - uiH/2;
  ctx.textBaseline='middle'; ctx.shadowBlur=0;

  ctx.textAlign='left'; ctx.font=`bold ${Math.min(15,tileSize*0.44)}px sans-serif`;
  ctx.fillStyle='#ffffff'; ctx.fillText(`🛡 ${lives}`, 10, midY-12);
  ctx.fillStyle='#ffd700'; ctx.fillText(`💎 ${coins}`, 10, midY+12);

  ctx.textAlign='center'; ctx.fillStyle='#00ccff';
  ctx.font=`bold ${Math.min(14,tileSize*0.42)}px sans-serif`;
  ctx.fillText(`Wave ${wave} / ${WAVES.length}`, W/2, midY-13);
  ctx.font=`${Math.min(12,tileSize*0.36)}px sans-serif`;
  ctx.fillStyle='#aaaaaa';
  if (waveCooldown > 0) ctx.fillText(`Next wave in ${Math.ceil(waveCooldown)}s`, W/2, midY+10);
  else if (!waveActive) ctx.fillText('Waves cleared!', W/2, midY+10);
  else ctx.fillText('Defend Earth!', W/2, midY+10);

  const btnW=Math.min(80, Math.floor((W*0.5)/3) - 4);
  const btnH=uiH-10;
  const paletteX = W - (btnW+6)*3 - 6;

  if (selectedTowerNode) {
    const sx=paletteX-btnW-10, sy=H-uiH+5;
    const sv=Math.floor(TOWER_TYPES[selectedTowerNode.type].cost/2);
    roundRect(sx,sy,btnW,btnH,7);
    ctx.fillStyle='rgba(160,30,20,0.92)'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.font=`bold ${Math.min(13,tileSize*0.38)}px sans-serif`;
    ctx.fillText('SELL',sx+btnW/2,sy+btnH*0.35);
    ctx.fillStyle='#ffd700';
    ctx.font=`${Math.min(11,tileSize*0.33)}px sans-serif`;
    ctx.fillText(`+💎${sv}`,sx+btnW/2,sy+btnH*0.7);
  }

  for (let i=0; i<TOWER_ORDER.length; i++) {
    const type=TOWER_ORDER[i];
    const def=TOWER_TYPES[type];
    const bx=paletteX+i*(btnW+6), by=H-uiH+5;
    const sel=selectedTower===type;
    roundRect(bx,by,btnW,btnH,7);
    ctx.fillStyle=sel?'rgba(10,70,160,0.95)':'rgba(14,14,38,0.92)'; ctx.fill();
    ctx.strokeStyle=def.color; ctx.lineWidth=sel?2.5:1;
    if (sel) { ctx.shadowColor=def.color; ctx.shadowBlur=6; }
    ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle=def.color; ctx.textAlign='center';
    ctx.font=`bold ${Math.min(13,tileSize*0.38)}px sans-serif`;
    ctx.fillText(def.name,bx+btnW/2,by+btnH*0.34);
    ctx.fillStyle='#ffd700';
    ctx.font=`${Math.min(11,tileSize*0.33)}px sans-serif`;
    ctx.fillText(`💎${def.cost}`,bx+btnW/2,by+btnH*0.68);
  }
}

function renderMenu(t) {
  ctx.fillStyle='#030312'; ctx.fillRect(0,0,W,H);
  renderStars(t);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(38,W*0.07)}px sans-serif`;
  ctx.fillStyle='#00eeff'; ctx.shadowColor='#00eeff'; ctx.shadowBlur=18;
  ctx.fillText('GALAXY DEFENDERS',W/2,H*0.28); ctx.shadowBlur=0;
  ctx.font=`${Math.min(18,W*0.034)}px sans-serif`;
  ctx.fillStyle='#cccccc';
  ctx.fillText('Protect Earth from the alien swarm',W/2,H*0.4);
  ctx.font=`${Math.min(13,W*0.025)}px sans-serif`;
  ctx.fillStyle='#888888';
  ctx.fillText('Tap an empty tile to place a tower  •  Tap tower to sell',W/2,H*0.5);
  ctx.fillText('⚡ Laser  💥 Plasma  🎯 Sniper',W/2,H*0.57);
  const pulse=1+0.04*Math.sin(t*2.5);
  const bw=Math.min(200,W*0.45), bh=50;
  ctx.save(); ctx.translate(W/2,H*0.72); ctx.scale(pulse,pulse);
  roundRect(-bw/2,-bh/2,bw,bh,12);
  ctx.fillStyle='#006699'; ctx.fill();
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#ffffff'; ctx.font=`bold ${Math.min(20,W*0.04)}px sans-serif`;
  ctx.fillText('TAP TO START',0,0); ctx.restore();
}

function renderGameOver(t) {
  ctx.fillStyle=gameWon?'#021102':'#110202'; ctx.fillRect(0,0,W,H);
  renderStars(t);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(40,W*0.075)}px sans-serif`;
  ctx.fillStyle=gameWon?'#44ff66':'#ff4444';
  ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=20;
  ctx.fillText(gameWon?'EARTH SAVED! 🌍':'EARTH DESTROYED 💥',W/2,H*0.3);
  ctx.shadowBlur=0;
  ctx.font=`${Math.min(20,W*0.038)}px sans-serif`;
  ctx.fillStyle='#cccccc';
  ctx.fillText(`Wave ${wave} of ${WAVES.length}  •  Crystals earned: 💎${score}`,W/2,H*0.45);
  ctx.font=`${Math.min(15,W*0.028)}px sans-serif`;
  ctx.fillStyle='#888888';
  ctx.fillText('Tap anywhere to play again',W/2,H*0.6);
}

// ── Input ─────────────────────────────────────────────────────────────────────

function getPos(e) {
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width, scaleY=H/rect.height;
  if (e.touches) {
    return { x:(e.touches[0].clientX-rect.left)*scaleX, y:(e.touches[0].clientY-rect.top)*scaleY };
  }
  return { x:(e.clientX-rect.left)*scaleX, y:(e.clientY-rect.top)*scaleY };
}

function onInput(e) {
  e.preventDefault();
  const {x,y} = getPos(e);

  if (state==='menu')     { state='game'; initGame(); return; }
  if (state==='gameover') { state='menu'; return; }
  if (state!=='game')     return;

  if (y > H-uiH) { handleUITouch(x,y); return; }

  for (const t of towers) {
    if (Math.hypot(x-t.x,y-t.y) < tileSize*0.52) {
      selectedTowerNode = (selectedTowerNode===t) ? null : t;
      return;
    }
  }

  selectedTowerNode = null;

  const col=Math.floor(x/tileSize), row=Math.floor(y/tileSize);
  const key=col+','+row;
  if (col<0||col>=cols||row<0||row>=rows) return;
  if (occupiedSet.has(key)) return;
  const def=TOWER_TYPES[selectedTower];
  if (coins<def.cost) return;
  coins-=def.cost;
  occupiedSet.add(key);
  towers.push({ type:selectedTower, col, row,
    x:col*tileSize+tileSize/2, y:row*tileSize+tileSize/2,
    cooldown:0, range:def.range, dmg:def.dmg, fireRate:def.fireRate,
    color:def.color, splashR:def.splashR, aimAngle:-Math.PI/2 });
}

function handleUITouch(x,y) {
  const btnW=Math.min(80,Math.floor((W*0.5)/3)-4);
  const btnH=uiH-10, paletteX=W-(btnW+6)*3-6;

  if (selectedTowerNode) {
    const sx=paletteX-btnW-10, sy=H-uiH+5;
    if (x>=sx&&x<=sx+btnW&&y>=sy&&y<=sy+btnH) {
      coins+=Math.floor(TOWER_TYPES[selectedTowerNode.type].cost/2);
      occupiedSet.delete(selectedTowerNode.col+','+selectedTowerNode.row);
      towers=towers.filter(t=>t!==selectedTowerNode);
      selectedTowerNode=null;
      return;
    }
  }

  for (let i=0;i<TOWER_ORDER.length;i++) {
    const bx=paletteX+i*(btnW+6), by=H-uiH+5;
    if (x>=bx&&x<=bx+btnW&&y>=by&&y<=by+btnH) {
      selectedTower=TOWER_ORDER[i]; selectedTowerNode=null; return;
    }
  }
}

canvas.addEventListener('touchstart', onInput, {passive:false});
canvas.addEventListener('mousedown',  onInput);

window.addEventListener('orientationchange', () => setTimeout(()=>location.reload(),200));

// ── Main loop ─────────────────────────────────────────────────────────────────

let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts-lastTs)/1000, 0.05);
  lastTs = ts;
  if (flashTimer>0) flashTimer-=dt;
  const t = ts/1000;

  if (state==='menu') {
    renderMenu(t);
  } else if (state==='gameover') {
    renderGameOver(t);
  } else {
    update(dt);
    renderGame(t);
  }
  requestAnimationFrame(loop);
}

resize();
buildPath();
buildStars();
requestAnimationFrame(ts => { lastTs=ts; requestAnimationFrame(loop); });
</script>
